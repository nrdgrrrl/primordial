# Primordial canonical defaults
# This committed file is the source of truth for user-meaningful config defaults.

[simulation]
mode = "energy"           # energy | predator_prey | boids | drift
initial_population = 80
max_population = 220
food_spawn_rate = 0.8000
food_max_particles = 300
food_cycle_enabled = true
food_cycle_period = 1800    # total cycle length in sim frames (1800 ~= 30s)
mutation_rate = 0.0600
cosmic_ray_rate = 0.000300
energy_to_reproduce = 0.8000
creature_speed_base = 1.5000
zone_count = 5
zone_strength = 0.8000

[display]
visual_theme = "ocean"    # ocean | petri | geometric | chaotic
fullscreen = true
target_fps = 60
show_hud = true

[rendering]
glyph_size_base = 48
kin_line_max_distance = 0.0
kin_line_min_group = 3
territory_top_n = 0
territory_shimmer_lerp = 0.0500
territory_fade_seconds = 2.00
death_animation_frames = 40
birth_animation_frames = 30
death_particle_count = 5
zone_background_intensity = 1.20
predator_highlight_alpha = 220
predator_highlight_radius_scale = 2.10
predator_highlight_pulse_seconds = 1.10

# Per-mode parameter overrides — these override the base [simulation] values
# when that mode is active. Edit to tune each mode independently.

[modes.predator_prey]
initial_population = 120
predator_fraction = 0.1200
food_spawn_rate = 0.6500
mutation_rate = 0.0800
adaptive_tuning_enabled = false
energy_to_reproduce = 0.7000
prey_energy_to_reproduce = 0.7600
predator_energy_to_reproduce = 0.7800
predator_kill_energy_gain_cap = 0.3000
predator_hunt_sense_multiplier = 1.4000
predator_hunt_speed_multiplier = 0.7000
predator_contact_kill_distance_scale = 0.8500
prey_flee_sense_multiplier = 1.2000
predator_prey_scarcity_penalty_multiplier = 2.0000
food_cycle_amplitude = 1.0000
predator_food_efficiency_multiplier = 0.8500
predator_forage_cost_multiplier = 0.7200
predator_recent_animal_energy_required = 0.0400
predator_recent_animal_energy_decay_per_tick = 0.000100
predator_satiety_ticks = 360
predator_interference_strength = 0.3000
predator_target_prey_per_predator = 4.0000
predator_low_prey_hunt_floor = 0.3500
prey_to_predator_aggression_threshold = 0.3000
predator_to_prey_aggression_threshold = 0.2000
extinction_grace_ticks = 7200
stability_history_size = 20
adaptive_step_escalation_runs = 5
adaptive_step_escalation_percent = 25.0
adaptive_trial_seed_count = 2
adaptive_max_consecutive_retry_trials = 2
adaptive_survival_deadband = 50
adaptive_near_extinction_predator_floor = 5
adaptive_near_extinction_prey_floor = 5

[modes.boids]
initial_population = 150
max_population = 300
mutation_rate = 0.0700
energy_to_reproduce = 0.7200
food_cycle_enabled = false
zone_strength = 0.5000

[modes.drift]
initial_population = 60
max_population = 200
mutation_rate = 0.0400
cosmic_ray_rate = 0.000600
energy_to_reproduce = 0.9500
food_cycle_enabled = false
zone_strength = 0.6000
target_fps = 60
